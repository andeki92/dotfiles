# mise configuration
# See: https://mise.jdx.dev/configuration.html

[tools]
adr-tools = "3.0.0"
age = "1.3.1"
"aqua:bats-core/bats-core" = "1.13.0"
bat = "0.26.1"
bottom = "0.14.1"
fd = "10.4.2"
fzf = "0.73.1"
gh = "2.95.0"
"github:cilium/cilium-cli" = "0.19.4"
gitleaks = "8.30.1"
go = "1.26.4"
gradle = "9.6.0"
helm = "4.2.2"
jq = "1.8.2"               # also: JSON validity check in claude lint-dispatch hook
kubectl = "1.36.2"
kubectx = "0.11.0"
kubens = "0.11.0"
lefthook = "2.1.9"
neovim = "0.12.3"
"npm:markdownlint-cli2" = "0.22.1"
opentofu = "1.12.3"
"pipx:yamllint" = "1.38.0"
python = "3.14.6"
ripgrep = "15.1.0"
rust = "1.96.0"
shellcheck = "0.11.0"
sops = "3.13.1"
starship = "1.25.1"
talosctl = "1.13.5"
task = "3.51.1"
uv = "0.11.23"
yq = "4.53.3"

# required by lazyvim
lua = "5.4.8" # MUST be 5.1
lazygit = "0.62.2"
"github:luarocks/luarocks" = "3.12.2"
"cargo:tree-sitter-cli" = "0.26.9"
java = "25.0.3+9.0.LTS"
node = "latest"

[settings]
experimental = true

# Install `pipx:` backend tools (e.g. yamllint) with uv's `uv tool` instead of
# pipx — no pipx dependency, much faster. Requires the `uv` tool above.
[settings.pipx]
uvx = true
